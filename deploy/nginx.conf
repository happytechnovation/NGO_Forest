# Internal nginx config (runs INSIDE the container, listens on 3000).
# The host's system nginx terminates HTTPS and proxies to this on the mapped host port.
server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Health endpoint used by Docker HEALTHCHECK and the deploy script
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Long-cache fingerprinted build assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Long-cache downloaded media resources
    location /resources/ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # SPA history fallback — every route serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 1024;
}
