# Host (system) nginx site for Treelands Foundation.
# Lives on the VPS at /etc/nginx/sites-available/treelands.happytechnovation.com
# Terminates HTTPS and reverse-proxies to the container on host port 3006.

server {
    listen 80;
    server_name treelands.happytechnovation.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name treelands.happytechnovation.com;

    ssl_certificate /etc/letsencrypt/live/treelands.happytechnovation.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/treelands.happytechnovation.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    client_max_body_size 25M;

    # Static React SPA container (Treelands) — host port 3006 -> container 3000
    location / {
        proxy_pass http://localhost:3006;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;
    }
}
